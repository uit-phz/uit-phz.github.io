version: '3.8'

# ============================================
# Agentic Omnichannel Chatbot — Full Stack
# ============================================
# 8 Channels: Telegram, WhatsApp, Messenger, Instagram, LINE, Viber, Discord, Webchat
# Self-hosted · Unlimited contacts · LLM-powered
#
# Usage:
#   cp .env.example .env   # Configure first
#   docker compose up -d   # Start everything
#   docker compose logs -f gateway  # Watch agent logs

services:
  # ─────────────────────────────────────────
  # PostgreSQL — Primary Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_platform}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/migrate-orders.sql:/docker-entrypoint-initdb.d/02-orders.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-net

  # ─────────────────────────────────────────
  # Redis — Conversation Memory & Cache
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-net

  # ─────────────────────────────────────────
  # Channel Gateway — Agentic AI Chatbot Engine
  # ─────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: chatbot-gateway
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=4000
      - DATABASE_URL=postgres://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chatbot_platform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      # ── AI Providers ──
      - AI_DEFAULT_PROVIDER=${AI_DEFAULT_PROVIDER:-gemini}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-1000}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-haiku-latest}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # ── Meta (Messenger + Instagram) ──
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - META_PAGE_ACCESS_TOKEN=${META_PAGE_ACCESS_TOKEN}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN:-verify_chatbot_2024}
      - META_WEBHOOK_SECRET=${META_WEBHOOK_SECRET}
      # ── WhatsApp (Cloud API) ──
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN:-verify_wa_2024}
      # ── Telegram ──
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET}
      # ── Viber ──
      - VIBER_AUTH_TOKEN=${VIBER_AUTH_TOKEN}
      - VIBER_BOT_NAME=${VIBER_BOT_NAME:-Assistant}
      # ── LINE ──
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      # ── Discord ──
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_PREFIX=${DISCORD_PREFIX:-!bot }
      # ── Admin ──
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-key-change-me}
      - GATEWAY_SECRET=${GATEWAY_SECRET}
    volumes:
      - gateway_logs:/app/logs
      - ./knowledge:/app/knowledge:ro    # Knowledge base (read-only mount)
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chatbot-net

  # ─────────────────────────────────────────
  # Nginx — Reverse Proxy + Dashboard
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: chatbot-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./dashboard:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - gateway
    networks:
      - chatbot-net

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  gateway_logs:
    driver: local

# ─────────────────────────────────────────
# Network
# ─────────────────────────────────────────
networks:
  chatbot-net:
    driver: bridge
